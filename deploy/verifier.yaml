apiVersion: v1
kind: ServiceAccount
metadata:
  name: verifier
  namespace: verifier-poc
---
# mirrord operator's ClusterRole gives access to operator CRDs. The CLI also
# does direct kube reads on the target (deployments, pods, services, etc.)
# to validate before handing off to the operator — so we need a namespaced
# Role for those too.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: verifier-mirrord-user
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mirrord-operator-user
subjects:
  - kind: ServiceAccount
    name: verifier
    namespace: verifier-poc
---
# Required for the CLI to discover the operator — without this binding,
# mirrord falls back to creating the agent Job itself in the target namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: verifier-mirrord-user-basic
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mirrord-operator-user-basic
subjects:
  - kind: ServiceAccount
    name: verifier
    namespace: verifier-poc
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: verifier-target-reader
  namespace: verifier-poc
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log", "pods/exec", "pods/portforward", "pods/attach"]
    verbs: ["get", "create"]
  # Stage 2 (preview env path) — verifier creates ConfigMap (build context),
  # Kaniko Job (image build), and via the mirrord CLI talks to the operator
  # which spawns the preview pod. Pods perms also cover the operator-less
  # fallback (legacy non-operator agent creation).
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: verifier-target-reader
  namespace: verifier-poc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: verifier-target-reader
subjects:
  - kind: ServiceAccount
    name: verifier
    namespace: verifier-poc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: verifier
  namespace: verifier-poc
  labels:
    app: verifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: verifier
  template:
    metadata:
      labels:
        app: verifier
    spec:
      serviceAccountName: verifier
      containers:
        - name: verifier
          image: gcr.io/mirrord-test/mirrord-sre-verifier:dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: verifier-secrets
                  key: anthropic-api-key
            - name: VERIFIER_MODEL
              value: "claude-sonnet-4-6"
            # When the engine runs the candidate under mirrord, the candidate's
            # outbound calls to `pricing` resolve via the steered pod's DNS
            # context. Setting PRICING_URL forces the HTTP path so that the
            # latency comes from the in-cluster pricing pod, not the local sim.
            - name: PRICING_URL
              value: "http://pricing.verifier-poc.svc.cluster.local"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: verifier
  namespace: verifier-poc
  labels:
    app: verifier
spec:
  selector:
    app: verifier
  ports:
    - name: http
      port: 8000
      targetPort: http
